# ─────────────────────────────────────────────────
#  SUMU — Nginx Reverse Proxy Configuration
#  Place this in: /etc/nginx/sites-available/sumu
#  Then: sudo ln -s /etc/nginx/sites-available/sumu /etc/nginx/sites-enabled/
#  Then: sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL Certificates (from Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "no-referrer-when-downgrade" always;

    # Max upload size (match server UPLOAD_MAX_MB)
    client_max_body_size 15M;

    # ── Static uploads (served directly, bypasses Node) ──────────────
    location /uploads/ {
        alias /home/youruser/sumu/public/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ── Socket.io WebSocket upgrade ───────────────────────────────────
    location /socket.io/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── All other requests → Node/Express ────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
